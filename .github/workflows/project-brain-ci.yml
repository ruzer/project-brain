name: project-brain-ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quality-gates:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm run test

      - name: Run smoke tests
        run: npm run test:smoke

      - name: Generate reports
        if: always()
        run: |
          mkdir -p ci-artifacts
          cp reports/ci_status_report.md ci-artifacts/
          cp reports/test_baseline_report.md ci-artifacts/
          cp reports/test_coverage_initial.md ci-artifacts/

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: project-brain-ci-reports
          path: ci-artifacts/
