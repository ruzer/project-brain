name: project-brain-ci

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: project-brain-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm run test

      - name: Run smoke tests
        run: npm run test:smoke

      - name: Repository safety scan
        run: npm run security:repo

      - name: Generate reports
        if: always()
        run: |
          mkdir -p ci-artifacts
          for file in \
            reports/ci_status_report.md \
            reports/test_baseline_report.md \
            reports/test_coverage_initial.md
          do
            if [ -f "$file" ]; then
              cp "$file" ci-artifacts/
            fi
          done

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: project-brain-ci-reports
          path: ci-artifacts/
          if-no-files-found: ignore
