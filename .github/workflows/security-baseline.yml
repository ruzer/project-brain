name: security-baseline

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "0 15 * * 1"

permissions:
  contents: read

jobs:
  security-baseline:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Repository safety scan
        run: npm run security:repo

      - name: Production dependency audit
        run: npm run security:audit
